# --- Thông tin cá nhân Trần Hải Long --- #
title: "Trần Hải Long"
author: "Trần Hải Long"
navbar-title: "Hải Long | FTU" # Tên hiển thị trên thanh điều hướng
timezone: "Asia/Ho_Chi_Minh"

# --- Các liên kết trên thanh Menu --- #
navbar-links:
  Giới thiệu: "aboutme"
  Kinh nghiệm: "experience"
  Cuộc thi TAXPERT: "https://www.facebook.com/Taxpert.CFAA"
  Cuộc thi TAC 2025: "https://www.facebook.com/TAC.CFAA"

# --- Hình ảnh đại diện --- #
# Lưu ý: Bạn nên tải ảnh chân dung lên thư mục assets/img/ và đổi tên tại đây
avatar: "/assets/img/avatar-icon.png"
round-avatar: true # Cắt ảnh thành hình tròn

# --- Mạng xã hội (Thay link của bạn vào đây) --- #
social-network-links:
  email: "long.tran@ftu.edu.vn"
  facebook: "tran.hailong.ftu" # Thay bằng ID Facebook của bạn
  github: "your-github-username" 
  linkedin: "your-linkedin-username"

# --- Mô tả ngắn gọn (Xuất hiện khi chia sẻ link) --- #
rss-description: "Sinh viên K63 FTU | Kế toán - Kiểm toán ACCA | IELTS 7.5 | BTC TAXPERT & TAC 2025"

# --- Cấu hình màu sắc (Tông màu đỏ FTU & xám chuyên nghiệp) --- #
page-col: "#FFFFFF"
text-col: "#222222"
link-col: "#E31837"     # Màu đỏ đặc trưng của Ngoại thương
hover-col: "#B0122A"    # Màu đỏ đậm khi di chuột qua
navbar-col: "#F8F9FA"   # Thanh menu màu xám nhạt chuyên nghiệp
navbar-text-col: "#333333"
footer-col: "#F8F9FA"

# --- Cấu hình hệ thống (Giữ nguyên để web chạy đúng) --- #
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5
kramdown:
  input: GFM

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      social-share: true
  -
    scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - docs/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
